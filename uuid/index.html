<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UUID QR Generator</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      margin: 20px;
      background: #fff;
      color: #111;
    }

    .toolbar {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    button {
      padding: 10px 16px;
      border: 1px solid #ccc;
      background: #f5f5f5;
      cursor: pointer;
      border-radius: 6px;
      font-size: 14px;
    }

    button:hover {
      background: #e9e9e9;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 20px;
      max-width: 1400px;
      margin: 0 auto;
    }

    .card {
      border: 1px solid #ddd;
      padding: 12px;
      text-align: center;
      border-radius: 8px;
      background: #fff;
      min-height: 220px;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      align-items: center;
    }

    .qr-wrap {
      width: 140px;
      height: 140px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 10px;
    }

    .uuid-label {
      font-size: 11px;
      line-height: 1.3;
      word-break: break-all;
      max-width: 100%;
      padding: 0 4px;
    }

    @media (max-width: 1200px) {
      .grid {
        grid-template-columns: repeat(4, 1fr);
      }
    }

    @media (max-width: 900px) {
      .grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    @media (max-width: 600px) {
      .grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }
  </style>
</head>
<body>
  <div class="toolbar">
    <button id="regenBtn">Regenerate UUIDs</button>
  </div>

  <div id="grid" class="grid"></div>

  <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
  <script>
    const TOTAL_ITEMS = 20;
    const grid = document.getElementById("grid");
    const regenBtn = document.getElementById("regenBtn");

    function generateUUID() {
      if (window.crypto && crypto.randomUUID) {
        return crypto.randomUUID();
      }

      // Fallback if randomUUID is not supported
      return "xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx".replace(/[xy]/g, function(c) {
        const r = Math.random() * 16 | 0;
        const v = c === "x" ? r : (r & 0x3 | 0x8);
        return v.toString(16);
      });
    }

    async function createQRCodeCanvas(text) {
      const canvas = document.createElement("canvas");
      await QRCode.toCanvas(canvas, text, {
        width: 140,
        margin: 1,
        errorCorrectionLevel: "M"
      });
      return canvas;
    }

    async function renderGrid() {
      grid.innerHTML = "";

      for (let i = 0; i < TOTAL_ITEMS; i++) {
        const uuid = generateUUID();

        const card = document.createElement("div");
        card.className = "card";

        const qrWrap = document.createElement("div");
        qrWrap.className = "qr-wrap";

        const label = document.createElement("div");
        label.className = "uuid-label";
        label.textContent = uuid;

        try {
          const qrCanvas = await createQRCodeCanvas(uuid);
          qrWrap.appendChild(qrCanvas);
        } catch (err) {
          qrWrap.textContent = "QR Error";
          console.error("QR generation failed:", err);
        }

        card.appendChild(qrWrap);
        card.appendChild(label);
        grid.appendChild(card);
      }
    }

    regenBtn.addEventListener("click", renderGrid);

    renderGrid();
  </script>
</body>
</html>
